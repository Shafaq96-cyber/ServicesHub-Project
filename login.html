<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ServicesHub | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-box">
        <h2 style="text-align:center; color:#4f46e5">Welcome Back</h2>
        <p style="text-align:center; margin-bottom:20px">Login to your account</p>
        
        <form>
            <input type="email" placeholder="Email Address" required>
            <input type="password" placeholder="Password" required>
            
            <button type="submit" class="submit-btn">Login</button>
            <p style="text-align:center; margin-top:15px; font-size:14px">
                Don't have an account? <a href="signup.html" style="color:#4f46e5">Sign Up</a>
            </p>
        </form>
    </div>
</div>

<script>
    const loginForm = document.querySelector('form');
    
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.querySelector('input[type="email"]').value;
        const password = document.querySelector('input[type="password"]').value;

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                alert("Welcome " + data.user.fullname + "!");
                
                // --- ROLE BASED REDIRECT (YAHAN HONA CHAHIYE) ---
                if (data.user.role === 'Service Provider') {
                    window.location.href = "provider.html"; // Admin/Provider ke liye
                } else {
                    window.location.href = "dashboard.html"; // Aam Customer ke liye
                }
            } else {
                alert(data.message);
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Backend se rabta nahi ho saka.");
        }
    });
</script>
</body>
</html>
