<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ServicesHub | Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-box">
        <h2 style="text-align:center; color:#4f46e5">Join ServicesHub</h2>
        <p style="text-align:center; margin-bottom:20px">Create your account</p>
        
        <form>
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email Address" required>
            <input type="password" placeholder="Password" required>
            
            <p style="font-weight:bold; font-size:14px; margin-bottom:10px; text-align:left;">Register as:</p>
<div style="display: flex; gap: 20px; margin-bottom: 20px; align-items: center;">
    <label style="display: flex; align-items: center; cursor: pointer; font-size: 14px;">
        <input type="radio" name="role" value="Customer" checked style="margin-right: 8px;"> Customer
    </label>
    <label style="display: flex; align-items: center; cursor: pointer; font-size: 14px;">
        <input type="radio" name="role" value="Service Provider" style="margin-right: 8px;"> Service Provider
    </label>
</div>
            
            <button type="submit" class="submit-btn">Create Account</button>
            <p style="text-align:center; margin-top:15px; font-size:14px">
                Already have an account? <a href="login.html" style="color:#4f46e5">Login</a>
            </p>
        </form>
    </div>
</div>

</body>
<script>
    const signupForm = document.querySelector('form');

    signupForm.addEventListener('submit', async (e) => {
        e.preventDefault(); // Form ko auto-submit hone se rokna

        // Form fields se data lena
        const fullname = document.querySelector('input[placeholder="Full Name"]').value;
        const email = document.querySelector('input[placeholder="Email Address"]').value;
        const password = document.querySelector('input[placeholder="Password"]').value;
        const role = document.querySelector('input[name="role"]:checked').parentElement.textContent.trim();

        // --- Client-side Validation (5 Marks) ---
        if (fullname === "" || email === "" || password === "") {
            alert("Yaara, saare fields bharna lazmi hain!");
            return;
        }

        if (password.length < 6) {
            alert("Password kam se kam 6 characters ka hona chahiye.");
            return;
        }
        // ----------------------------------------

        // Agar validation pass ho jaye, to backend ko data bhejo
        try {
            const response = await fetch('/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fullname, email, password, role })
            });

            const data = await response.json();
            if (response.ok) {
                alert("Account ban gaya! Ab login karein.");
                window.location.href = "login.html";
            } else {
                alert("Error: " + data.message);
            }
        } catch (error) {
            console.error("Fetch error:", error);
        }
    });
</script>

</html>
